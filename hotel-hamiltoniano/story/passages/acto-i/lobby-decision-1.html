<!-- 🎭 PASAJE: RESULTADO DECISIÓN LOBBY -->
<div class="quantum-passage decision-result">
    <h2>🔮 Realidad Colapsada</h2>
    
    <div class="decision-outcome">
        <p>Has elegido: <strong id="decision-value"></strong></p>
        <p class="reality-id">Nueva realidad: <code id="reality-id"></code></p>
    </div>

    <div class="character-response">
        <div class="character-avatar">🎭</div>
        <div class="dialog-content">
            <strong>Halim responde:</strong>
            <p id="halim-response">Cargando respuesta cuántica...</p>
        </div>
    </div>

    <div class="next-actions">
        <h3>¿Qué deseas hacer ahora?</h3>
        <button onclick="continueToElevator()">🚀 Continuar al elevador de cuerdas</button>
        <button onclick="meetTheCat()">🐱 Buscar al gato de Schrödinger</button>
        <button onclick="returnToLobby()">↩️ Regresar al Lobby</button>
    </div>
</div>

<script>
(function() {
    // Cargar respuesta de Halim basada en la decisión
    const decision = window.quantumEngine.getDecisionState('lobby-entrada');
    const responseElement = document.getElementById('halim-response');
    
    const responses = {
        0: "Un observador cuidadoso. La paciencia es una virtud cuántica. ¿Qué más desea examinar antes de colapsar más realidades?",
        1: "La pizarra de Planck acepta tu gesto. La tiza vibra con ecuaciones que todavía no existen.",
        2: "El gato está... bueno, usted sabe cómo es. Actualmente superpone ronroneos y silencios en proporciones elegantes.",
        3: "Fascinante enfoque científico. El jacuzzi autoconsciente aprecia su atención meticulosa a la entropía."
    };
    
    const choiceIdx = parseInt(decision.collapsedState.id.split('-').pop(), 10);
    if (responseElement && responses[choiceIdx] !== undefined) {
        responseElement.textContent = responses[choiceIdx];
    }
    const decisionEl = document.getElementById('decision-value');
    const realityEl = document.getElementById('reality-id');
    if (decisionEl) decisionEl.textContent = decision.collapsedState.value;
    if (realityEl) realityEl.textContent = window.quantumEngine.calculateRealityId();
})();

function continueToElevator() {
    console.log('🛗 Navegando al elevador de cuerdas...');
    alert('¡Elevador de cuerdas cósmicas activado! (Próxima escena)');
}

function returnToLobby() {
    console.log('↩️ Regresando al lobby...');
    if (typeof window.loadPassage === 'function') {
        window.loadPassage('lobby-start');
    }
}

function meetTheCat() {
    console.log('🐱 Buscando al gato...');
    alert('El gato de Schrödinger aparece... o no aparece... o ambas cosas...');
}
</script>

}

.decision-outcome {
    background: rgba(0, 255, 255, 0.1);
    padding: 20px;
    border-radius: 15px;
    margin: 20px 0;
    text-align: center;
}

.reality-id {
    font-family: monospace;
    background: rgba(0, 0, 0, 0.3);
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
}

.next-actions {
    margin-top: 30px;
}

.next-actions button {
    display: block;

    margin: 10px 0;

    cursor: pointer;

}
