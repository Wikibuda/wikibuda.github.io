<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Hamiltoniano - Mapa de Decisiones</title>
    <style>
        body {
            background: linear-gradient(135deg, #0c0c2e, #1a1a3e);
            color: #e0e0ff;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(25, 25, 60, 0.9);
            border: 2px solid #4cc9f0;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(76, 201, 240, 0.3);
            margin-top: 20px;
        }
        h1 {
            text-align: center;
            color: #4cc9f0;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        .map-container {
            display: block;
            margin: 20px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .btn-volver {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #8888ff;
            color: #e0e0ff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .btn-volver:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .legend {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }
        .node-active {
            stroke: #00ff87;
            fill: rgba(0, 255, 135, 0.2);
            filter: drop-shadow(0 0 6px rgba(0, 255, 135, 0.5));
        }
        .node-pending {
            stroke-dasharray: 6,6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 MAPA CUÁNTICO — ACTO I</h1>
        <div class="map-container">
            <svg width="100%" viewBox="0 0 700 400" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="max-width: 700px; height: auto;">
                <!-- Conexiones -->
                <line x1="350" y1="50" x2="350" y2="120" stroke="#4cc9f0" stroke-width="2" stroke-dasharray="5,5"/>
                <line x1="350" y1="120" x2="150" y2="220" stroke="#4cc9f0" stroke-width="2"/>
                <line x1="350" y1="120" x2="350" y2="220" stroke="#4cc9f0" stroke-width="2"/>
                <line x1="350" y1="120" x2="550" y2="220" stroke="#4cc9f0" stroke-width="2"/>
                <line x1="350" y1="220" x2="350" y2="320" stroke="#4cc9f0" stroke-width="2" stroke-dasharray="5,5"/>

                <!-- Nodos -->
                <circle id="node-lobby" cx="350" cy="50" r="28" fill="#1a1a3e" stroke="#4cc9f0" stroke-width="2"/>
                <text x="350" y="55" text-anchor="middle" fill="#4cc9f0" font-size="12" font-family="Courier New">Lobby</text>

                <circle id="node-decision-1" cx="350" cy="120" r="24" fill="#1a1a3e" stroke="#4cc9f0" stroke-width="2"/>
                <text x="350" y="125" text-anchor="middle" fill="#4cc9f0" font-size="10" font-family="Courier New">Decisión 1</text>

                <circle id="node-observar" cx="150" cy="220" r="26" fill="#1a1a3e" stroke="#ff6bcb" stroke-width="2"/>
                <text x="150" y="215" text-anchor="middle" fill="#ff6bcb" font-size="11" font-family="Courier New">Observar</text>

                <circle id="node-pizarra" cx="350" cy="220" r="26" fill="#1a1a3e" stroke="#4cc9f0" stroke-width="2"/>
                <text x="350" y="215" text-anchor="middle" fill="#4cc9f0" font-size="11" font-family="Courier New">Pizarra</text>

                <circle id="node-gato" cx="550" cy="220" r="26" fill="#1a1a3e" stroke="#ffd700" stroke-width="2"/>
                <text x="550" y="215" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Courier New">Gato</text>

                <circle id="node-ramas" cx="350" cy="320" r="24" fill="#1a1a3e" stroke="#4cc9f0" stroke-width="2" stroke-dasharray="4,4"/>
                <text x="350" y="325" text-anchor="middle" fill="#4cc9f0" font-size="10" font-family="Courier New">+3 ramas</text>
            </svg>
        </div>
        <div class="legend">
            🟦 Lobby → 🌀 Decisión → 🟪 Observar | 🟦 Pizarra | 🟨 Gato → ...
            <div id="current-reality" style="margin-top: 8px; font-family: monospace;"></div>
        </div>
        <div style="text-align: center;">
            <button class="btn-volver" onclick="volverAlLobby()">
                🔙 Volver al Lobby Cuántico
            </button>
        </div>
    </div>
    <script>
        function volverAlLobby() {
            window.location.href = "./index.html?t=" + Date.now();
        }
            (function() {
                const svg = document.querySelector('svg');
                if (svg) {
                    svg.style.width = '100%';
                    svg.style.height = 'auto';
                }

                const STORAGE_KEY = 'hotel_hamiltoniano_v2';
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;

                let state;
                try {
                    state = JSON.parse(raw);
                } catch (e) {
                    return;
                }

                const setActive = (id) => {
                    const node = document.getElementById(id);
                    if (node) node.classList.add('node-active');
                };

                setActive('node-lobby');

                if (state && state.currentReality) {
                    const realityEl = document.getElementById('current-reality');
                    if (realityEl) {
                        realityEl.textContent = `Realidad actual: ${state.currentReality}`;
                    }
                }

                const decisions = Array.isArray(state?.superposedStates) ? state.superposedStates : [];
                const lobbyDecision = decisions.find(item => item.id === 'lobby-entrada');
                if (!lobbyDecision) return;

                setActive('node-decision-1');

                const choiceIndex = lobbyDecision.collapsedIndex;
                if (choiceIndex === 0) setActive('node-observar');
                if (choiceIndex === 1) setActive('node-pizarra');
                if (choiceIndex === 2) setActive('node-gato');
                if (choiceIndex === 3) setActive('node-ramas');
            })();
    </script>
</body>
</html>
